<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .item {
        background-color: red;
        font-size: 25px;
        padding: 20px;
        text-align: center;
        margin: 5px;
        /* width: 30px; */
    }

    .parent {
        width: 500px;
        border: 4px solid rebeccapurple;
        display: grid;
        /* how many cols with how many px */
        grid-template-columns: 100px 100px 200px 100px;
        /* how many rows with how many px */
        grid-template-rows: 70px 70px 70px;
    }
    .item1 {
        background-color: blueviolet;
        grid-column-start:4 ;
        grid-column-end: 5;
        grid-row-start:2 ;
        grid-row-end:3;
    }
    .item3{
        background-color: chartreuse;
        grid-column-start:3 ;
        grid-column-end: 4;
        grid-row-start:3 ;
        grid-row-end:4;
    }
    .item2{
        background-color: chocolate;
        /* start/end */
        grid-column: 1/2;
        grid-row: 3/4;
    }
    .item5{
        background-color: rgb(30, 168, 210);
        /* start/end */
        grid-column: 3/4;
        grid-row: 2/3;
    }
</style>

<body>
    <div class="parent">
        <div class="item item1">1</div>
        <div class="item item2">2</div>
        <div class="item item3">3</div>
        <div class="item">4</div>
        <div class="item item5">5</div>
        <div class="item">6</div>
    </div>

</body>

</html>
