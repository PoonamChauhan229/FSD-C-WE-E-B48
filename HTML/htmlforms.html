<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
</head>
<body>
    <h2><u><mark>HTML SignIn <i>Form</i></mark></u></h2>
    <hr>
    <form>
        <!-- input feilds -->
        <!--label tag bind first for & id has to be same attr val -->
        <!-- name=value userName=guvi-->
         <label for="uname">UserName:</label>
         <input type="text" name="userName" id="uname">
         <br><br>
          <!-- password= -- name=value> -->
         <input type="password" name="password" id="" placeholder="Enter Password" value="test123">
            <br><br>
        <!-- radio buttons +label only 1 selections-->
         <!-- name = group attribute ||name=value -->
          <!-- gender >>name=gender -->
         <input type="radio" name="gender" id="male" value="male">
         <label for="male">Male</label>

        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label>

        <input type="radio" name="gender" id="transgender" value="transgender">
        <label for="transgender">Transgender</label>
       <br><br>
        <!-- checkboxes >> try it out  and come tommrow -->
         <input type="checkbox" name="" id="">
         <label for="">Swimming</label>
             <br><br>

             <input type="color" name="" id="">
             <input type="datetime" name="" id="">
             <input type="date" name="" id="">
             <input type="range" name="" id="">
             <input type="file" name="" id="">
             <input type="email" name="" id="">
         <input type="submit" value="Submit">
         <input type="reset" value="Reset">
    </form>
    <hr>
</body>
</html>
